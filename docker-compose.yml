services:
  claude-slack-bridge:
    container_name: claude-slack-bridge
    build: .
    env_file:
      - .env
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GH_TOKEN=${GITHUB_TOKEN}
    volumes:
      # Mount the host ~/.claude DIRECTORY (read-only) so the credentials file
      # survives Claude's atomic-rename token refresh. A single-file bind mount
      # detaches when the host rewrites .credentials.json (new inode) on each
      # OAuth refresh, making the file vanish in the container ("Not logged in").
      # entrypoint.sh symlinks /host-claude/.credentials.json into the container's
      # own writable ~/.claude (which still holds the CLI's session data).
      - ${HOME}/.claude:/host-claude:ro
      # Mount all projects so claude -p can run from the correct project directory
      - ${PROJECTS_DIR}:/projects
      # Mount the channel→project routing config live, so edits take effect on
      # restart without rebuilding the image (was baked in before — host edits
      # never reached the container).
      - ./projects.json:/app/projects.json
      # Persist the container's ~/.claude (session transcripts, the bridge's
      # channel→session map, and journals) so a restart doesn't wipe a project's
      # conversation history — without this, every rebuild forces Claude to
      # re-explore from scratch.
      - claude-home:/home/appuser/.claude
      # UNIFY MEMORY: overlay the EMM project's memory dir with the host terminal
      # session's memory (read-write), so the Slack-bridge me and the terminal me
      # share ONE memory store — write a memory either side, the other sees it.
      # Surgical: only the memory subdir, not the whole .claude (transcripts stay
      # per-runtime in the named volume above).
      - ${HOME}/.claude/projects/-Users-fydeos-Dev-ccplayground-emmshopify/memory:/home/appuser/.claude/projects/-projects-emmshopify/memory
    restart: unless-stopped

volumes:
  claude-home:
