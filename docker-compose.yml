services:
  claude-slack-bridge:
    container_name: claude-slack-bridge
    build: .
    env_file:
      - .env
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GH_TOKEN=${GITHUB_TOKEN}
    volumes:
      # Mount Claude CLI credentials (read-only); CLI writes session data inside the container
      - ${HOME}/.claude/.credentials.json:/home/appuser/.claude/.credentials.json:ro
      # Mount all projects so claude -p can run from the correct project directory
      - ${PROJECTS_DIR}:/projects
      # Mount the channel→project routing config live, so edits take effect on
      # restart without rebuilding the image (was baked in before — host edits
      # never reached the container).
      - ./projects.json:/app/projects.json
    restart: unless-stopped
